const STORE_KEY = 'kpi_dashboard_key';

function b64ToBytes(b64){ return Uint8Array.from(atob(b64), c => c.charCodeAt(0)); }
function bytesToB64(bytes){ return btoa(String.fromCharCode(...bytes)); }

async function deriveKey(password){
  const material = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveBits']);
  const bits = await crypto.subtle.deriveBits(
    { name:'PBKDF2', hash:'SHA-256', salt:b64ToBytes(ENC.salt), iterations:ENC.iterations },
    material, 256);
  return new Uint8Array(bits);
}

async function decryptWith(keyBytes){
  const key = await crypto.subtle.importKey('raw', keyBytes, 'AES-GCM', false, ['decrypt']);
  const plainBuf = await crypto.subtle.decrypt(
    { name:'AES-GCM', iv:b64ToBytes(ENC.iv) }, key, b64ToBytes(ENC.ciphertext));
  return new TextDecoder().decode(plainBuf);
}

function show(html){
  document.open(); document.write(html); document.close();
}

// 保存済みの鍵があれば自動で開く（ソルトが変わっていたら破棄）
(async () => {
  try {
    const saved = JSON.parse(localStorage.getItem(STORE_KEY) || 'null');
    if (saved && saved.salt === ENC.salt) {
      show(await decryptWith(b64ToBytes(saved.key)));
    } else if (saved) {
      localStorage.removeItem(STORE_KEY);
    }
  } catch (e) { localStorage.removeItem(STORE_KEY); }
})();

document.getElementById('form').addEventListener('submit', async (ev) => {
  ev.preventDefault();
  const btn = document.getElementById('btn');
  const error = document.getElementById('error');
  btn.disabled = true; btn.textContent = '確認中…'; error.style.display = 'none';
  try {
    const keyBytes = await deriveKey(document.getElementById('pw').value);
    const html = await decryptWith(keyBytes);
    if (document.getElementById('remember').checked) {
      localStorage.setItem(STORE_KEY, JSON.stringify({ salt: ENC.salt, key: bytesToB64(keyBytes) }));
    }
    show(html);
  } catch (e) {
    error.style.display = 'block';
    btn.disabled = false; btn.textContent = '開く';
  }
});
</script>
